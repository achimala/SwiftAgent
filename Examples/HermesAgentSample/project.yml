name: HermesAgentSample
options:
  bundleIdPrefix: com.daysail
  deploymentTarget:
    iOS: "17.0"
packages:
  AgentKit:
    path: ../..
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
targets:
  HermesAgentSample:
    type: application
    platform: iOS
    sources:
      - path: HermesAgentSample
        excludes:
          - PythonApp
    resources:
      - path: HermesAgentSample/PythonApp
        type: folder
      - path: HermesAgentSample/commandDictionary.plist
    dependencies:
      - package: AgentKit
        product: AgentKit
      - target: HermesAgentWorker
        embed: true
    info:
      path: HermesAgentSample/Info.plist
      properties:
        CFBundleDisplayName: Hermes Agent
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daysail.HermesAgentSample
        ENABLE_TESTABILITY: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        EX_ENABLE_EXTENSION_POINT_GENERATION: YES
    postCompileScripts:
      - name: Process Python libraries
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          "$PROJECT_DIR/../../Scripts/agentkit-install-hermes.sh"
  HermesAgentWorker:
    type: extensionkit-extension
    platform: iOS
    sources:
      - path: HermesAgentWorker
    dependencies:
      - package: AgentKit
        product: AgentKit
    info:
      path: HermesAgentWorker/Info.plist
      properties:
        CFBundleDisplayName: Hermes Worker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daysail.HermesAgentSample.HermesAgentWorker
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    postCompileScripts:
      - name: Process Python libraries
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          "$PROJECT_DIR/../../Scripts/agentkit-install-hermes.sh"
