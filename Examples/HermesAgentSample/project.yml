name: HermesAgentSample
options:
  bundleIdPrefix: com.daysail
  deploymentTarget:
    iOS: "17.0"
configFiles:
  Debug: Signing.xcconfig
  Release: Signing.xcconfig
packages:
  SwiftAgent:
    path: ../..
  SwiftAgentMLX:
    path: ../../Packages/SwiftAgentMLX
  SwiftAgentFoundationModels:
    path: ../../Packages/SwiftAgentFoundationModels
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "$(SWIFTAGENT_SAMPLE_DEVELOPMENT_TEAM)"
targets:
  HermesAgentSample:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: HermesAgentSample
    resources:
      - path: HermesAgentSample/commandDictionary.plist
    dependencies:
      - package: SwiftAgent
        product: SwiftAgent
      - package: SwiftAgentMLX
        product: SwiftAgentMLX
      - package: SwiftAgentFoundationModels
        product: SwiftAgentFoundationModels
    info:
      path: HermesAgentSample/Info.plist
      properties:
        CFBundleDisplayName: SwiftAgent
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        DEVELOPMENT_TEAM: "$(SWIFTAGENT_SAMPLE_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(SWIFTAGENT_SAMPLE_BUNDLE_ID_PREFIX).HermesAgentSample"
        ENABLE_TESTABILITY: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    postCompileScripts:
      - name: Process Python libraries
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          "$PROJECT_DIR/../../Scripts/swiftagent-install-hermes.sh"
