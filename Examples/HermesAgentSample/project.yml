name: HermesAgentSample
options:
  bundleIdPrefix: com.daysail
  deploymentTarget:
    iOS: "17.0"
configFiles:
  Debug: Signing.xcconfig
  Release: Signing.xcconfig
packages:
  AgentKit:
    path: ../..
  AgentKitMLX:
    path: ../../Packages/AgentKitMLX
  AgentKitFoundationModels:
    path: ../../Packages/AgentKitFoundationModels
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "$(AGENTKIT_SAMPLE_DEVELOPMENT_TEAM)"
targets:
  HermesAgentSample:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: HermesAgentSample
    resources:
      - path: HermesAgentSample/commandDictionary.plist
    dependencies:
      - package: AgentKit
        product: AgentKit
      - package: AgentKitMLX
        product: AgentKitMLX
      - package: AgentKitFoundationModels
        product: AgentKitFoundationModels
      - target: HermesAgentWorker
        embed: true
    info:
      path: HermesAgentSample/Info.plist
      properties:
        CFBundleDisplayName: Hermes Agent
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        DEVELOPMENT_TEAM: "$(AGENTKIT_SAMPLE_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(AGENTKIT_SAMPLE_BUNDLE_ID_PREFIX).HermesAgentSample"
        ENABLE_TESTABILITY: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        EX_ENABLE_EXTENSION_POINT_GENERATION: YES
    postCompileScripts:
      - name: Process Python libraries
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          "$PROJECT_DIR/../../Scripts/agentkit-install-hermes.sh"
  HermesAgentWorker:
    type: extensionkit-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: HermesAgentWorker
    dependencies:
      - package: AgentKit
        product: AgentKit
      - package: AgentKitMLX
        product: AgentKitMLX
      - package: AgentKitFoundationModels
        product: AgentKitFoundationModels
    info:
      path: HermesAgentWorker/Info.plist
      properties:
        CFBundleDisplayName: Hermes Worker
    settings:
      base:
        DEVELOPMENT_TEAM: "$(AGENTKIT_SAMPLE_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(AGENTKIT_SAMPLE_BUNDLE_ID_PREFIX).HermesAgentSample.HermesAgentWorker"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    postCompileScripts:
      - name: Process Python libraries
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          "$PROJECT_DIR/../../Scripts/agentkit-install-hermes.sh"
